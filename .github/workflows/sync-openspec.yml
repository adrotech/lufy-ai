name: Sync OpenSpec baseline

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "Compatible OpenSpec version to propose"
        required: false
        type: string
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  propose-bump:
    name: Propose baseline bump by PR
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Resolve requested bump
        id: bump
        run: |
          set -euo pipefail
          current="$(cd tools/lufy-cli-go && go run ./cmd/openspec-upstream get-version ../../openspec/UPSTREAM.json)"
          requested="${{ github.event.inputs.upstream_version || '' }}"
          if [ -z "$requested" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=no upstream_version input provided; scheduled discovery is intentionally non-mutating" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$requested" = "$current" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=requested version already matches baseline $current" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "reason=requested version is not semver: $requested" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$requested" >> "$GITHUB_OUTPUT"
          echo "branch=chore/sync-openspec-$requested" >> "$GITHUB_OUTPUT"

      - name: Report no-op
        if: steps.bump.outputs.changed != 'true'
        run: |
          printf 'OpenSpec baseline sync skipped: %s\n' "${{ steps.bump.outputs.reason }}"

      - name: Update baseline metadata
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -euo pipefail
          version="${{ steps.bump.outputs.version }}"
          (
            cd tools/lufy-cli-go
            go run ./cmd/openspec-upstream set-version "$version" \
              ../../openspec/UPSTREAM.json \
              internal/assets/embedded/openspec/UPSTREAM.json
          )

      - name: Validate proposed bump
        if: steps.bump.outputs.changed == 'true'
        run: scripts/validate.sh

      - name: Create or update pull request
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.bump.outputs.branch }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add openspec/UPSTREAM.json tools/lufy-cli-go/internal/assets/embedded/openspec/UPSTREAM.json
          git commit -m "chore: sync OpenSpec baseline $VERSION"
          git push --set-upstream origin "$BRANCH"
          body="$(printf '%s\n' \
            '## Summary' \
            "- Proposes OpenSpec baseline $VERSION through reviewable metadata changes." \
            '- Keeps root and embedded UPSTREAM.json in parity.' \
            '- Does not automerge, tag or publish releases.' \
            '' \
            '## Validation' \
            '- scripts/validate.sh')"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: sync OpenSpec baseline $VERSION" \
            --body "$body" || gh pr edit "$BRANCH" \
            --title "chore: sync OpenSpec baseline $VERSION" \
            --body "$body"
