name: auto-release-tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: auto-release-tag-main
  cancel-in-progress: false

jobs:
  tag-release:
    name: Create automatic release tag
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve target and next tag
        id: release-tag
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HAS_RELEASE_PATCH: ${{ contains(github.event.pull_request.labels.*.name, 'release:patch') }}
          HAS_RELEASE_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'release:minor') }}
          HAS_RELEASE_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'release:major') }}
          HAS_RELEASE_SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'release:skip') }}
        run: |
          if [[ -z "$MERGE_COMMIT_SHA" ]]; then
            echo "No se recibió merge_commit_sha para el PR #${PR_NUMBER}" >&2
            exit 2
          fi

          bump_count=0
          [ "$HAS_RELEASE_PATCH" = "true" ] && bump_count=$((bump_count + 1))
          [ "$HAS_RELEASE_MINOR" = "true" ] && bump_count=$((bump_count + 1))
          [ "$HAS_RELEASE_MAJOR" = "true" ] && bump_count=$((bump_count + 1))

          if [ "$HAS_RELEASE_SKIP" = "true" ] && [ "$bump_count" -gt 0 ]; then
            echo "release:skip no puede combinarse con release:* bump labels" >&2
            exit 2
          fi
          if [ "$bump_count" -gt 1 ]; then
            echo "labels de release conflictivos: solo puede existir un release:* bump label" >&2
            exit 2
          fi

          if [ "$HAS_RELEASE_SKIP" = "true" ]; then
            bump="skip"
          elif [ "$HAS_RELEASE_MAJOR" = "true" ]; then
            bump="major"
          elif [ "$HAS_RELEASE_MINOR" = "true" ]; then
            bump="minor"
          else
            bump="patch"
          fi

          title_sanitized="$(printf '%s' "$PR_TITLE" | tr '\r\n\t' '   ' | tr -cd '[:print:] ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//' | cut -c1-160)"
          title_sanitized="${title_sanitized:-sin titulo}"

          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          git fetch --tags origin

          if ! git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "No se pudo resolver refs/remotes/origin/main después del fetch determinista; no se creará tag estable." >&2
            exit 2
          fi

          if ! git cat-file -e "${MERGE_COMMIT_SHA}^{commit}"; then
            echo "merge_commit_sha no resuelve a un commit: ${MERGE_COMMIT_SHA}" >&2
            exit 2
          fi

          if ! git merge-base --is-ancestor "$MERGE_COMMIT_SHA" refs/remotes/origin/main; then
            echo "El merge commit ${MERGE_COMMIT_SHA} no es alcanzable desde origin/main; no se creará tag estable." >&2
            exit 2
          fi

          if [[ "$bump" == "skip" ]]; then
            echo "release:skip detectado para PR #${PR_NUMBER}; no se creará tag estable."
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "merge_commit_sha=$MERGE_COMMIT_SHA" >> "$GITHUB_OUTPUT"
            echo "pr_title_sanitized=$title_sanitized" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$({
            for tag in $(git tag --list 'v*'); do
              if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                printf '%s\n' "$tag"
              fi
            done
          } | sort -V | tail -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump" in
              major) next_tag="v$((major + 1)).0.0" ;;
              minor) next_tag="v${major}.$((minor + 1)).0" ;;
              patch) next_tag="v${major}.${minor}.$((patch + 1))" ;;
              *) echo "bump desconocido: $bump" >&2; exit 2 ;;
            esac
          fi

          echo "skip_release=false" >> "$GITHUB_OUTPUT"
          echo "merge_commit_sha=$MERGE_COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "pr_title_sanitized=$title_sanitized" >> "$GITHUB_OUTPUT"
          echo "Siguiente tag calculado: ${next_tag} (bump: ${bump}, último tag simple: ${latest_tag:-ninguno})"

      - name: Create and push annotated tag
        if: steps.release-tag.outputs.skip_release != 'true'
        id: create-tag
        env:
          MERGE_COMMIT_SHA: ${{ steps.release-tag.outputs.merge_commit_sha }}
          NEXT_TAG: ${{ steps.release-tag.outputs.next_tag }}
          BUMP: ${{ steps.release-tag.outputs.bump }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE_SANITIZED: ${{ steps.release-tag.outputs.pr_title_sanitized }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          calculate_next_tag() {
            local latest="$1"
            local bump="$2"
            if [[ -z "$latest" ]]; then
              printf 'v0.1.0\n'
              return 0
            fi
            local version="${latest#v}"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump" in
              major) printf 'v%s.0.0\n' "$((major + 1))" ;;
              minor) printf 'v%s.%s.0\n' "$major" "$((minor + 1))" ;;
              patch) printf 'v%s.%s.%s\n' "$major" "$minor" "$((patch + 1))" ;;
              *) echo "bump desconocido: $bump" >&2; return 2 ;;
            esac
          }

          latest_stable_tag() {
            for tag in $(git tag --list 'v*'); do
              if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                printf '%s\n' "$tag"
              fi
            done | sort -V | tail -n 1
          }

          next_tag="$NEXT_TAG"
          for attempt in 1 2 3; do
            git fetch --tags origin
            if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null || git ls-remote --exit-code --tags origin "refs/tags/${next_tag}" >/dev/null 2>&1; then
              next_tag="$(calculate_next_tag "$(latest_stable_tag)" "$BUMP")"
              echo "Tag existente detectado; reintentando con ${next_tag}."
              sleep "$attempt"
              continue
            fi

            git tag -a "$next_tag" "$MERGE_COMMIT_SHA" \
              -m "Release automático ${next_tag}" \
              -m "Creado al mergear PR #${PR_NUMBER}: ${PR_TITLE_SANITIZED}" \
              -m "Merge commit: ${MERGE_COMMIT_SHA}"

            if git push origin "refs/tags/${next_tag}"; then
              echo "tag_created=true" >> "$GITHUB_OUTPUT"
              echo "created_tag=$next_tag" >> "$GITHUB_OUTPUT"
              echo "Tag anotado ${next_tag} creado sobre ${MERGE_COMMIT_SHA} y pusheado a origin."
              exit 0
            fi

            git tag -d "$next_tag" >/dev/null 2>&1 || true
            next_tag="$(calculate_next_tag "$(latest_stable_tag)" "$BUMP")"
            sleep "$attempt"
          done

          echo "No se pudo crear tag estable tras reintentos acotados." >&2
          exit 1

      - name: Dispatch release workflow for created tag
        if: steps.create-tag.outputs.tag_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_TAG: ${{ steps.create-tag.outputs.created_tag }}
        run: |
          gh workflow run release.yml --ref "$NEXT_TAG" --field "tag=$NEXT_TAG"
          echo "Workflow release.yml invocado explícitamente para ${NEXT_TAG}."
