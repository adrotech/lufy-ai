name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag v* existente a publicar'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release-artifacts:
    name: Build and validate release artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go from go.mod
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lufy-cli-go/go.mod
          cache-dependency-path: tools/lufy-cli-go/go.mod

      - name: Resolve release metadata
        id: meta
        env:
          DISPATCH_TAG: ${{ inputs.tag || '' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "$DISPATCH_TAG" ]]; then
              echo "workflow_dispatch requiere input tag" >&2
              exit 2
            fi
            version="$DISPATCH_TAG"
          else
            if [[ "${GITHUB_REF_TYPE}" != "tag" || ! "${GITHUB_REF_NAME}" =~ ^v ]]; then
              echo "release solo permitido desde tags v*: ${GITHUB_REF}" >&2
              exit 2
            fi
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "version inválida: $version" >&2
            exit 2
          fi

          git fetch --force --tags origin "refs/tags/${version}:refs/tags/${version}"
          release_commit="$(git rev-parse "${version}^{commit}")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=${release_commit::12}" >> "$GITHUB_OUTPUT"
          echo "release_commit=$release_commit" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Guard tag is reachable from main
        env:
          RELEASE_COMMIT: ${{ steps.meta.outputs.release_commit }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ! git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "No se pudo resolver refs/remotes/origin/main después del fetch determinista; no se publicará el release estable." >&2
            exit 2
          fi

          if ! git merge-base --is-ancestor "$RELEASE_COMMIT" refs/remotes/origin/main; then
            echo "tag ${RELEASE_VERSION} apunta a $RELEASE_COMMIT, que no es alcanzable desde origin/main" >&2
            echo "Promueve develop -> main antes de publicar un release estable." >&2
            exit 2
          fi

      - name: Go tests
        working-directory: tools/lufy-cli-go
        run: go test ./...

      - name: Go build
        working-directory: tools/lufy-cli-go
        run: go build ./cmd/lufy-ai

      - name: Build release artifacts and checksums
        working-directory: tools/lufy-cli-go
        env:
          LUFY_AI_VERSION: ${{ steps.meta.outputs.version }}
          LUFY_AI_COMMIT: ${{ steps.meta.outputs.commit }}
          LUFY_AI_BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          LUFY_AI_DIST_DIR: dist
        run: scripts/build-release-artifacts.sh "${{ steps.meta.outputs.version }}"

      - name: Generate release SBOM and provenance
        working-directory: tools/lufy-cli-go
        env:
          LUFY_AI_VERSION: ${{ steps.meta.outputs.version }}
          LUFY_AI_COMMIT: ${{ steps.meta.outputs.release_commit }}
          LUFY_AI_BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          LUFY_AI_DIST_DIR: dist
        run: scripts/generate-release-metadata.sh "${{ steps.meta.outputs.version }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        working-directory: tools/lufy-cli-go/dist
        env:
          COSIGN_YES: "true"
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          shopt -s nullglob
          for file in \
            lufy-ai_${RELEASE_VERSION}_*.tar.gz \
            lufy-ai_${RELEASE_VERSION}_*.zip \
            lufy-ai_${RELEASE_VERSION}_checksums.txt \
            lufy-ai_${RELEASE_VERSION}_sbom.spdx.json \
            lufy-ai_${RELEASE_VERSION}_provenance.intoto.jsonl; do
            cosign sign-blob --yes --bundle "${file}.bundle" "$file"
          done

      - name: Verify release verification material exists
        working-directory: tools/lufy-cli-go/dist
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          test -s "lufy-ai_${RELEASE_VERSION}_checksums.txt"
          test -s "lufy-ai_${RELEASE_VERSION}_sbom.spdx.json"
          test -s "lufy-ai_${RELEASE_VERSION}_provenance.intoto.jsonl"
          shopt -s nullglob
          artifacts=(lufy-ai_${RELEASE_VERSION}_*.tar.gz lufy-ai_${RELEASE_VERSION}_*.zip lufy-ai_${RELEASE_VERSION}_checksums.txt lufy-ai_${RELEASE_VERSION}_sbom.spdx.json lufy-ai_${RELEASE_VERSION}_provenance.intoto.jsonl)
          for file in "${artifacts[@]}"; do
            test -s "${file}.bundle"
          done

      - name: Smoke release artifacts
        working-directory: tools/lufy-cli-go
        run: scripts/smoke-release-artifacts.sh

      - name: Smoke bootstrap installer
        run: tools/lufy-cli-go/scripts/smoke-bootstrap.sh

      - name: Verify generated checksums
        working-directory: tools/lufy-cli-go/dist
        run: shasum -a 256 -c "lufy-ai_${{ steps.meta.outputs.version }}_checksums.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lufy-ai-${{ steps.meta.outputs.version }}-release-artifacts
          path: |
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_*.tar.gz
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_*.zip
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_checksums.txt
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_sbom.spdx.json
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_provenance.intoto.jsonl
            tools/lufy-cli-go/dist/*.bundle
          if-no-files-found: error

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_*.tar.gz
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_*.zip
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_checksums.txt
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_sbom.spdx.json
            tools/lufy-cli-go/dist/lufy-ai_${{ steps.meta.outputs.version }}_provenance.intoto.jsonl
            tools/lufy-cli-go/dist/*.bundle
