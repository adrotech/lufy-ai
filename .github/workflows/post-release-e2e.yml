name: post-release-e2e

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag v* publicado a validar'
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-e2e:
    name: Validate published release artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          tag="${INPUT_TAG:-$RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "tag inválido: $tag" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: E2E release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: tools/lufy-cli-go/scripts/e2e-release-artifact.sh "${{ steps.tag.outputs.tag }}"
