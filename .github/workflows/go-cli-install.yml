name: Go CLI install

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/install.sh"
      - "scripts/validate.sh"
      - "scripts/check-actions-pinned.sh"
      - "scripts/check-shell.sh"
      - "scripts/check-workflows-yaml.rb"
      - "scripts/quality-go.sh"
      - "tools/lufy-cli-go/**"
      - "README.md"
      - "docs/**"
      - "AGENTS.md"
      - ".opencode/**"
      - "openspec/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/**"
      - "scripts/install.sh"
      - "scripts/validate.sh"
      - "scripts/check-actions-pinned.sh"
      - "scripts/check-shell.sh"
      - "scripts/check-workflows-yaml.rb"
      - "scripts/quality-go.sh"
      - "tools/lufy-cli-go/**"
      - "README.md"
      - "docs/**"
      - "AGENTS.md"
      - ".opencode/**"
      - "openspec/**"

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep

      - name: Validate
        env:
          LUFY_AI_VALIDATE_BASE: ${{ github.base_ref || 'develop' }}
        run: scripts/validate.sh

  platform-go:
    name: Go tests and build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Go tests
        working-directory: tools/lufy-cli-go
        run: go test ./...

      - name: Go build
        working-directory: tools/lufy-cli-go
        run: go build ./cmd/lufy-ai

  go-cli-install:
    name: Test, build and smoke Go installer
    runs-on: ubuntu-latest
    needs: [quality, platform-go]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Build local wrapper binary
        working-directory: tools/lufy-cli-go
        run: |
          mkdir -p bin
          go build -o bin/lufy-ai ./cmd/lufy-ai

      - name: Installer smoke
        run: tools/lufy-cli-go/scripts/smoke-install.sh

      - name: Wrapper smoke
        run: tools/lufy-cli-go/scripts/smoke-wrapper.sh

      - name: OpenSpec sanity
        run: |
          if command -v openspec >/dev/null 2>&1; then
            openspec list --json
          else
            echo "::notice::openspec CLI no disponible en el runner; sanity OpenSpec omitido"
          fi
