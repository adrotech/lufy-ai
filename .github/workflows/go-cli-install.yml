name: Go CLI install

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - ".github/workflows/go-cli-install.yml"
      - ".github/workflows/release.yml"
      - "scripts/install.sh"
      - "scripts/validate.sh"
      - "tools/lufy-cli-go/**"
      - "README.md"
      - "docs/**"
      - "AGENTS.md"
      - ".opencode/**"
      - "openspec/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/go-cli-install.yml"
      - ".github/workflows/release.yml"
      - "scripts/install.sh"
      - "scripts/validate.sh"
      - "tools/lufy-cli-go/**"
      - "README.md"
      - "docs/**"
      - "AGENTS.md"
      - ".opencode/**"
      - "openspec/**"

permissions:
  contents: read

jobs:
  go-cli-install:
    name: Test, build and smoke Go installer
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/lufy-cli-go/go.mod

      - name: Validate
        env:
          LUFY_AI_VALIDATE_BASE: ${{ github.base_ref || 'develop' }}
        run: scripts/validate.sh

      - name: Build local wrapper binary
        working-directory: tools/lufy-cli-go
        run: |
          mkdir -p bin
          go build -o bin/lufy-ai ./cmd/lufy-ai

      - name: Installer smoke
        run: tools/lufy-cli-go/scripts/smoke-install.sh

      - name: Wrapper smoke
        run: tools/lufy-cli-go/scripts/smoke-wrapper.sh

      - name: OpenSpec sanity
        run: |
          if command -v openspec >/dev/null 2>&1; then
            openspec list --json
          else
            echo "::notice::openspec CLI no disponible en el runner; sanity OpenSpec omitido"
          fi
