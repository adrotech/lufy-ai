<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUFY Time Report</title>
  <style>
    :root { color-scheme: dark; --bg: #0f1220; --panel: #171b2e; --text: #eef2ff; --muted: #a8b0d0; --accent: #8bd5ff; --ok: #b6f09c; --warn: #ffd580; }
    body { margin: 0; font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 1120px; margin: 0 auto; padding: 32px 20px; }
    header, section { background: var(--panel); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.18); }
    h1, h2 { margin: 0 0 12px; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .card { background: rgba(255,255,255,.045); border-radius: 12px; padding: 14px; }
    .metric { font-size: 24px; font-weight: 700; color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.08); }
    th { color: var(--muted); font-weight: 600; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: rgba(139,213,255,.14); color: var(--accent); margin: 2px 4px 2px 0; }
    .warn { color: var(--warn); }
  </style>
</head>
<body>
  <main>
    {{BODY}}
  </main>
</body>
</html>
